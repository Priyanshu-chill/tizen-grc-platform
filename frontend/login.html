<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTSCP - Enterprise GRC Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style -->
    <link href="/static/styles.css" rel="stylesheet">
</head>
<body class="d-flex align-items-center py-4 bg-dark">
    
    <main class="form-signin w-100 m-auto login-container">
        <div class="glass-panel p-4 shadow">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem; filter: drop-shadow(0 0 10px var(--primary-blue-glow));"></i>
                <h1 class="h3 mt-3 mb-1 fw-extrabold text-white">UTSCP</h1>
                <p class="text-secondary small">Universal Tizen GRC Compliance Platform</p>
            </div>

            <div class="alert alert-danger d-none" id="loginError" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label text-secondary small">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary-subtle text-secondary"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control form-control-grc" id="username" placeholder="e.g. superadmin" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label text-secondary small">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary-subtle text-secondary"><i class="bi bi-key"></i></span>
                        <input type="password" class="form-control form-control-grc" id="password" placeholder="••••••••" required>
                    </div>
                </div>

                <button class="w-100 btn btn-primary py-2 fw-semibold" type="submit" id="loginBtn">
                    <span class="spinner-border spinner-border-sm d-none me-2" id="loginSpinner" role="status" aria-hidden="true"></span>
                    Sign In
                </button>
            </form>

            <div class="mt-4 pt-3 border-top border-secondary-subtle text-center">
                <p class="text-secondary mb-1 small"><i class="bi bi-info-circle me-1"></i> Seeded credentials (Password: <code>password123</code>):</p>
                <div class="d-flex flex-wrap justify-content-center gap-2 mt-2">
                    <span class="badge bg-secondary-subtle text-secondary cursor-pointer" onclick="fillCreds('superadmin')">superadmin</span>
                    <span class="badge bg-secondary-subtle text-secondary cursor-pointer" onclick="fillCreds('officer')">officer</span>
                    <span class="badge bg-secondary-subtle text-secondary cursor-pointer" onclick="fillCreds('auditor')">auditor</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Redirect if already authenticated
        if (localStorage.getItem("token")) {
            window.location.href = "/";
        }

        function fillCreds(username) {
            document.getElementById("username").value = username;
            document.getElementById("password").value = "password123";
        }

        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            
            const usernameInput = document.getElementById("username").value;
            const passwordInput = document.getElementById("password").value;
            const errorDiv = document.getElementById("loginError");
            const spinner = document.getElementById("loginSpinner");
            const btn = document.getElementById("loginBtn");

            errorDiv.classList.add("d-none");
            spinner.classList.remove("d-none");
            btn.disabled = true;

            const formData = new FormData();
            formData.append("username", usernameInput);
            formData.append("password", passwordInput);

            try {
                const response = await fetch("/api/auth/login", {
                    method: "POST",
                    body: formData
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem("token", data.access_token);
                    localStorage.setItem("role", data.role);
                    localStorage.setItem("username", data.username);
                    localStorage.setItem("org_id", data.organization_id || "");
                    
                    window.location.href = "/";
                } else {
                    const err = await response.json();
                    errorDiv.innerText = err.detail || "Authentication failed.";
                    errorDiv.classList.remove("d-none");
                }
            } catch (error) {
                console.error("Login request error:", error);
                errorDiv.innerText = "Network error connecting to API.";
                errorDiv.classList.remove("d-none");
            } finally {
                spinner.classList.add("d-none");
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
