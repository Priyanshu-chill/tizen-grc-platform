version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: utscf-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: TizenSecurePassword2026!
      POSTGRES_DB: utscf_grc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d utscf_grc"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: utscf-app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:TizenSecurePassword2026!@db:5432/utscf_grc
      - SECRET_KEY=TIZEN_GRC_PLATFORM_SUPER_SECRET_SECURITY_KEY
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/backend/uploads

volumes:
  pgdata:
